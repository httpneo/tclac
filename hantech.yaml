esphome:
  name: klimaanlage-schlafzimmer
  friendly_name: Klimaanlage Schlafzimmer

esp32:
  board: esp32dev
  framework:
    type: arduino
    advanced:
      minimum_chip_revision: "3.1"
      sram1_as_iram: true

logger:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE     
  fast_connect: true        
  reboot_timeout: 0s       

web_server:
  port: 80    
    
substitutions:
  device_name: klimaanlage_schlafzimmer
  humanly_name: "Klimaanlage Schlafzimmer"
  uart_tx: GPIO16
  uart_rx: GPIO17
  ota_pass: "90cf525a594c8bb2cbf917bc2c2fa058"

packages:
  remote_package:
    url: https://github.com/httpneo/tclac.git
    ref: master
    files:
      - packages/core.yaml
    refresh: 30s

mqtt:
  broker: !secret mqtt_host
  username: !secret mqtt_username
  password: !secret mqtt_password
